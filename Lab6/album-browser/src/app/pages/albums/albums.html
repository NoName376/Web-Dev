<div class="container">
  <h2 class="section-title">Digital Archive</h2>

  <div *ngIf="albums$ | async as state">
    <div class="status-msg" *ngIf="state.loading">
      <span class="scanner"></span> Synchronizing data...
    </div>
    <div class="status-msg error" *ngIf="state.error">Signal lost. Check connection.</div>
    <div class="status-msg" *ngIf="!state.loading && state.data.length === 0">Albums is empty.</div>

    <div class="grid" *ngIf="!state.loading && state.data.length > 0">
      <div class="grid-item" *ngFor="let album of state.data; let i = index" [style.animation-delay]="i * 50 + 'ms'">
        <div class="card">
          <div class="card-header">
            <span class="id-tag">#{{ album.id }}</span>
            <h3>{{ album.title }}</h3>
          </div>

          <div class="card-actions">
            <button class="btn-ui" [routerLink]="[album.id]">Open</button>
            <button class="btn-ui danger" (click)="delete(album.id)">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
